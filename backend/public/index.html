<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESL Writing Coach</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="topbar">
    <button id="menu-button" class="menu-button" title="記事一覧" aria-label="記事一覧を開く">☰</button>
    <h1><span class="topbar-title">ESL Writing Coach</span></h1>
    <span id="status" class="status"></span>
  </header>
  <div class="layout">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <button id="new-article" class="btn btn-primary">新規作成</button>
      </div>
      <ul id="article-list" class="article-list"></ul>
      <p id="empty-message" class="empty-message" hidden>記事がありません。「新規作成」から始めてください。</p>
      <div id="user-info" class="user-info" hidden>
        <span id="user-email" class="user-email" title=""></span>
        <a id="logout-link" class="logout-link" href="/cdn-cgi/access/logout" hidden>ログアウト</a>
      </div>
    </aside>
    <div id="sidebar-dim" class="sidebar-dim" aria-hidden="true"></div>
    <button id="sidebar-toggle" class="sidebar-divider" title="記事一覧を開閉"><span id="sidebar-toggle-icon">◀</span></button>
    <main id="editor" class="editor" hidden>
      <div class="editor-grid">
        <section class="column">
          <h2 class="group-title">入力</h2>
          <div class="pane">
            <h3>ユーザーの英作文 <span id="draft-words" class="word-count"></span></h3>
            <textarea id="draft" placeholder="英文を書く。日本語が混じっても OK（AI が英文化して添削します）"></textarea>
          </div>
        </section>
        <section class="column column-output">
          <h2 class="group-title">AI</h2>
          <button id="rules-button" class="rules-button" title="ルールを編集">
            <span class="rules-button-label">✎ ルール</span>
            <span id="rules-preview" class="rules-preview empty">未設定</span>
          </button>
          <div class="pane pane-output">
            <h3>添削済み英文 <span id="corrected-words" class="word-count"></span></h3>
            <div id="corrected" class="output"></div>
          </div>
          <div class="pane pane-output">
            <h3>アドバイス</h3>
            <div id="advice" class="output"></div>
          </div>
        </section>
      </div>
    </main>
    <main id="placeholder" class="placeholder">
      <p>記事を選択するか、「新規作成」から始めてください。</p>
    </main>
  </div>
  <dialog id="rules-dialog" class="rules-dialog">
    <h2>ルール</h2>
    <p class="rules-help">空欄のままでも大丈夫です。ルールを書くと、AI がそれに沿って添削とアドバイスを行います。文体・レベル・語数などを自由に指定できます。</p>
    <textarea id="rules" placeholder="例: カジュアルな表現を使う / 300 語以内にまとめる / TOEIC 600 点レベルの語彙で"></textarea>
    <div class="rules-dialog-footer">
      <button id="rules-close" class="btn">閉じる</button>
    </div>
  </dialog>
  <script src="/js/vendor/marked.umd.js"></script>
  <script src="/js/vendor/purify.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
